  <rect x="495" y="355" width="130" height="38" rx="19" fill="#1a1a3e" stroke="#2d2d6e" stroke-width="1"/>
  <text x="560" y="379" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Business</text>

  <rect x="640" y="355" width="140" height="38" rx="19" fill="#1a1a3e" stroke="#2d2d6e" stroke-width="1"/>
  <text x="710" y="379" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Education</text>

  <!-- Stats boxes -->
  <rect x="80" y="420" width="175" height="90" rx="12" fill="#1a1a3e" stroke="#2d2d6e" stroke-width="1"/>
  <text x="167" y="463" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#7c3aed" text-anchor="middle">24+</text>
  <text x="167" y="496" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Calculators</text>

  <rect x="275" y="420" width="175" height="90" rx="12" fill="#1a1a3e" stroke="#2d2d6e" stroke-width="1"/>
  <text x="362" y="463" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#7c3aed" text-anchor="middle">6</text>
  <text x="362" y="496" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Categories</text>

  <rect x="470" y="420" width="175" height="90" rx="12" fill="#1a1a3e" stroke="#2d2d6e" stroke-width="1"/>
  <text x="557" y="463" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#7c3aed" text-anchor="middle">100%</text>
  <text x="557" y="496" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Free</text>

